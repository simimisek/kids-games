<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="100" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1100" cy="530" r="220" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1050" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="550" r="150" fill="rgba(255,255,255,0.04)"/>

  <!-- Main card -->
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="700" fill="white" filter="drop-shadow(0 2px 12px rgba(0,0,0,0.3))">Vzdělávací hry</text>

  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="rgba(255,255,255,0.85)">pro děti — zdarma, bez reklam</text>

  <!-- Divider -->
  <rect x="460" y="320" width="280" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Category pills -->
  <!-- Math -->
  <rect x="155" y="360" width="270" height="110" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="290" y="408" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42">🔢</text>
  <text x="290" y="448" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="white" font-weight="600">Matematika</text>

  <!-- Czech -->
  <rect x="465" y="360" width="270" height="110" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="600" y="408" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42">📖</text>
  <text x="600" y="448" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="white" font-weight="600">Čeština</text>

  <!-- Preschool -->
  <rect x="775" y="360" width="270" height="110" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="910" y="408" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42">🌈</text>
  <text x="910" y="448" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="white" font-weight="600">Hrátky pro nejmenší</text>

  <!-- URL -->
  <text x="600" y="520" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">simimisek.github.io/kids-games</text>
</svg>
