  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #43b8f5 0%, #1565c0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 16px 40px;
      overflow-x: hidden;
    }

    /* ─── KOALA POZADÍ ─── */
    .koala-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .koala-bg .koala {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.2;
      animation: koalaFloat 6s ease-in-out infinite;
      user-select: none;
      /* font-size na rodiči = jednotný rozměr celé koalky */
    }
    .koala-head { font-size: 1em; line-height: 1; }
    .koala-body { width: 1.5em; height: auto; margin-top: -0.18em; display: block; }

    /* pozice + velikost (font-size řídí celou postavu) */
    .koala-bg .koala:nth-child(1)  { top:  3%; left:  2%; font-size: 4.2rem; animation-delay: 0s;   }
    .koala-bg .koala:nth-child(2)  { top:  6%; left: 74%; font-size: 4.8rem; animation-delay: 1.3s; }
    .koala-bg .koala:nth-child(3)  { top: 20%; left: 89%; font-size: 3.8rem; animation-delay: 0.6s; }
    .koala-bg .koala:nth-child(4)  { top: 38%; left:  1%; font-size: 5.2rem; animation-delay: 2.2s; }
    .koala-bg .koala:nth-child(5)  { top: 58%; left: 91%; font-size: 4.0rem; animation-delay: 0.9s; }
    .koala-bg .koala:nth-child(6)  { top: 73%; left:  6%; font-size: 4.6rem; animation-delay: 1.8s; }
    .koala-bg .koala:nth-child(7)  { top: 84%; left: 54%; font-size: 4.3rem; animation-delay: 3.1s; }
    .koala-bg .koala:nth-child(8)  { top: 91%; left: 18%; font-size: 5.0rem; animation-delay: 0.4s; }
    .koala-bg .koala:nth-child(9)  { top: 48%; left: 48%; font-size: 3.6rem; animation-delay: 2.6s; opacity: 0.13; }
    .koala-bg .koala:nth-child(10) { top: 13%; left: 40%; font-size: 3.9rem; animation-delay: 1.1s; }
    .koala-bg .koala:nth-child(11) { top: 66%; left: 68%; font-size: 4.4rem; animation-delay: 3.6s; }
    .koala-bg .koala:nth-child(12) { top: 33%; left: 23%; font-size: 4.1rem; animation-delay: 2.0s; }

    @keyframes koalaFloat {
      0%,100% { transform: translateY(0px) rotate(-4deg); }
      50%      { transform: translateY(-16px) rotate(4deg); }
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-top: 16px;
    }

    /* ─── TITULNÍ ─── */
    .title {
      font-size: 2.2rem;
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
      line-height: 1.2;
    }
    .subtitle {
      color: rgba(255,255,255,0.88);
      text-align: center;
      font-size: 1rem;
      line-height: 1.65;
    }

    /* ─── HUD ─── */
    .hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.22);
      border-radius: 14px;
      padding: 10px 20px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .hud-timer { font-variant-numeric: tabular-nums; }

    /* ─── GAME ─── */
    #screen-game { gap: 18px; }

    .instruction {
      color: rgba(255,255,255,0.92);
      font-size: 1rem;
      text-align: center;
      font-weight: 600;
    }

    /* Karty příkladů */
    .answers {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn-answer {
      width: 100%;
      padding: 22px 24px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14);
      transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-answer:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      background: #fff5f7;
    }
    .btn-answer:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-example {
      font-size: 1.9rem;
      font-weight: 800;
      color: #333;
      letter-spacing: 1px;
    }
    .btn-example .eq { color: #1565c0; }
    .btn-example .res { color: #333; }

    /* Stavy po odpovědi */
    .btn-answer.correct {
      background: #22c55e;
      box-shadow: 0 4px 20px rgba(34,197,94,0.45);
      transform: none;
    }
    .btn-answer.correct .btn-example,
    .btn-answer.correct .btn-example .eq,
    .btn-answer.correct .btn-example .res { color: #fff; }

    .btn-answer.wrong {
      background: #ef4444;
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    }
    .btn-answer.wrong .btn-example,
    .btn-answer.wrong .btn-example .eq,
    .btn-answer.wrong .btn-example .res { color: #fff; }

    .btn-answer.reveal {
      background: #22c55e;
      box-shadow: 0 4px 20px rgba(34,197,94,0.45);
    }
    .btn-answer.reveal .btn-example,
    .btn-answer.reveal .btn-example .eq,
    .btn-answer.reveal .btn-example .res { color: #fff; }

    /* ─── END ─── */
    #screen-end { gap: 20px; }

    .result-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .result-card h2 { font-size: 1.8rem; color: #333; margin-bottom: 8px; }
    .result-time { font-size: 3rem; font-weight: 700; color: #1565c0; margin: 12px 0; }
    .result-card p { color: #666; font-size: 0.95rem; }

    .name-row {
      width: 100%;
      display: flex;
      gap: 10px;
    }
    .name-row input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      outline: 2px solid transparent;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transition: outline 0.2s;
    }
    .name-row input:focus { outline: 2px solid #1565c0; }

    .leaderboard-card {
      background: #fff;
      border-radius: 20px;
      padding: 22px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .leaderboard-card h3 { text-align: center; color: #333; font-size: 1.1rem; margin-bottom: 14px; }
    .leaderboard-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .leaderboard-list li {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 0.95rem;
      color: #444;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .leaderboard-list li:last-child { border-bottom: none; }
    .lb-rank { font-weight: 700; color: #1565c0; text-align: center; }
    .lb-name { font-weight: 600; }
    .lb-time { font-variant-numeric: tabular-nums; color: #1565c0; font-weight: 700; }
    .lb-date { font-size: 0.78rem; color: #aaa; grid-column: 2 / 4; margin-top: -4px; }
    .lb-empty { text-align: center; color: #aaa; font-style: italic; font-size: 0.9rem; padding: 8px 0; }

    /* ─── TLAČÍTKA ─── */
    .btn {
      width: 100%; padding: 15px;
      font-size: 1.05rem; font-weight: 700;
      border: none; border-radius: 14px; cursor: pointer;
      transition: transform 0.1s; font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #1565c0; color: #fff;
      box-shadow: 0 4px 16px rgba(21,101,192,0.35);
    }
    .btn-primary:hover { background: #0d47a1; }
    .btn-secondary {
      background: rgba(21,101,192,0.1); color: #1565c0;
      border: 2px solid rgba(21,101,192,0.25); box-shadow: none;
    }
    .btn-secondary:hover { background: rgba(21,101,192,0.18); }

    /* ─── DOMŮ ─── */
    .btn-home-fixed {
      position: fixed; top: 12px; right: 12px; z-index: 200;
      background: rgba(0,0,0,0.25); border: none; border-radius: 10px;
      padding: 7px 14px; color: #fff; font-family: inherit;
      font-size: 0.85rem; font-weight: 700; text-decoration: none; cursor: pointer;
    }
    .btn-home-fixed:hover { background: rgba(0,0,0,0.4); }

    /* ─── RESPONZIVITA ─── */
    @media (max-width: 400px) {
      body { padding: 10px 10px 32px; }
      .title { font-size: 1.85rem; }
      .subtitle { font-size: 0.92rem; }
      .btn-example { font-size: 1.5rem; }
      .btn-answer { padding: 18px 16px; }
      .btn { padding: 14px; font-size: 1rem; }
    }
  </style>
</head>

<script>
  const QUIZ_TYPE = 'math-to30';
  const GOAL      = 10;
  const MAX_VAL   = 30;

  let score         = 0;
  let timerStart    = null;
  let timerInterval = null;
  let correctIndex  = -1;   // index správného příkladu (0, 1 nebo 2)
  let answering     = false;
  let finalMs       = 0;

  // ─── SCREENS ──────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ─── TIMER ────────────────────────────────────────────────
  function startTimer() {
    timerStart = Date.now();
    timerInterval = setInterval(() => {
      const el = document.getElementById('hud-timer');
      if (el) el.textContent = formatTime(Date.now() - timerStart);
    }, 100);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    finalMs = Date.now() - timerStart;
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ─── GENERÁTOR PŘÍKLADŮ ───────────────────────────────────
  // Vrátí { expr: string, result: number } — validní příklad do MAX_VAL
  function generateExample() {
    const useThree = Math.random() < 0.4;

    for (let i = 0; i < 200; i++) {
      if (!useThree) {
        const a  = randInt(0, MAX_VAL);
        const op = Math.random() < 0.5 ? '+' : '-';
        if (op === '+') {
          const b = randInt(0, MAX_VAL - a);
          return { expr: `${a} + ${b}`, result: a + b };
        } else {
          const b = randInt(0, a);
          return { expr: `${a} - ${b}`, result: a - b };
        }
      } else {
        const a   = randInt(0, MAX_VAL);
        const op1 = Math.random() < 0.5 ? '+' : '-';
        const op2 = Math.random() < 0.5 ? '+' : '-';
        const b   = randInt(0, MAX_VAL);
        const mid = op1 === '+' ? a + b : a - b;
        if (mid < 0 || mid > MAX_VAL) continue;
        const maxC = op2 === '+' ? MAX_VAL - mid : mid;
        if (maxC < 0) continue;
        const c = randInt(0, maxC);
        const r = op2 === '+' ? mid + c : mid - c;
        if (r < 0 || r > MAX_VAL) continue;
        return { expr: `${a} ${op1} ${b} ${op2} ${c}`, result: r };
      }
    }
    return { expr: '5 + 7', result: 12 };
  }

  // Vrátí špatný výsledek — odlišný od správného a od ostatních použitých
  function wrongResult(correct, used) {
    for (let attempt = 0; attempt < 300; attempt++) {
      const delta = randInt(1, 6) * (Math.random() < 0.5 ? 1 : -1);
      const candidate = correct + delta;
      if (candidate >= 0 && candidate <= MAX_VAL && !used.has(candidate)) {
        used.add(candidate);
        return candidate;
      }
    }
    // Záloha – najdi nejbližší volné číslo
    for (let d = 1; d <= MAX_VAL; d++) {
      if (!used.has(correct + d) && correct + d <= MAX_VAL) { used.add(correct + d); return correct + d; }
      if (!used.has(correct - d) && correct - d >= 0)       { used.add(correct - d); return correct - d; }
    }
    return correct + 1;
  }

  // ─── RENDER ───────────────────────────────────────────────
  function renderQuestion() {
    answering = false;

    // Vygeneruj 3 různé příklady
    const examples = [generateExample(), generateExample(), generateExample()];

    // Náhodně vyber, který bude správně vypočítaný
    correctIndex = randInt(0, 2);

    // Sestav zobrazované výsledky
    // Správný příklad → jeho skutečný výsledek
    // Ostatní → záměrně špatný výsledek (jiné číslo)
    const displayResults = examples.map((ex, i) => {
      if (i === correctIndex) return ex.result;
      const used = new Set([ex.result]);
      return wrongResult(ex.result, used);
    });

    // Vykresli karty
    const answersEl = document.getElementById('answers');
    answersEl.innerHTML = '';

    examples.forEach((ex, i) => {
      const btn = document.createElement('button');
      btn.className = 'btn-answer';
      btn.dataset.index = i;
      btn.innerHTML = `<span class="btn-example">${ex.expr} <span class="eq">=</span> <span class="res">${displayResults[i]}</span></span>`;
      btn.onclick = () => handleAnswer(btn, i);
      answersEl.appendChild(btn);
    });
  }

  // ─── ODPOVĚĎ ──────────────────────────────────────────────
  function handleAnswer(btn, chosenIndex) {
    if (answering) return;
    answering = true;

    const allBtns = document.querySelectorAll('.btn-answer');
    allBtns.forEach(b => b.disabled = true);

    if (chosenIndex === correctIndex) {
      btn.classList.add('correct');
      score++;
      document.getElementById('hud-score').textContent = `Správně: ${score} / ${GOAL}`;
    } else {
      btn.classList.add('wrong');
      // Odhal správný
      allBtns.forEach(b => {
        if (parseInt(b.dataset.index) === correctIndex) b.classList.add('reveal');
      });
    }

    setTimeout(() => {
      if (score >= GOAL) endGame();
      else renderQuestion();
    }, 300);
  }

  // ─── FLOW ─────────────────────────────────────────────────
  function startGame() {
    score = 0;
    finalMs = 0;
    clearInterval(timerInterval);
    document.getElementById('hud-score').textContent = `Správně: 0 / ${GOAL}`;
    document.getElementById('hud-timer').textContent = '0:00';
    showScreen('screen-game');
    renderQuestion();
    startTimer();
  }

  function endGame() {
    stopTimer();
    document.getElementById('final-time').textContent = formatTime(finalMs);
    document.getElementById('player-name').value = '';
    showScreen('screen-end');
    renderLeaderboard('lb-end');
  }

  // ─── LEADERBOARD ──────────────────────────────────────────
  const DB_URL = 'https://kids-games-3a167-default-rtdb.europe-west1.firebasedatabase.app';

  async function getScores() {
    try {
      const r = await fetch(DB_URL + '/scores/' + QUIZ_TYPE + '.json');
      const d = await r.json();
      return Array.isArray(d) ? d : [];
    } catch { return []; }
  }

  async function saveScore() {
    const nameInput = document.getElementById('player-name');
    const name = nameInput.value.trim();
    if (!name) { nameInput.style.outline = '3px solid #ef4444'; nameInput.focus(); return; }
    nameInput.style.outline = '';
    const scores = await getScores();
    scores.push({ name, ms: finalMs, date: new Date().toLocaleDateString('cs-CZ') });
    scores.sort((a, b) => a.ms - b.ms);
    const top10 = scores.slice(0, 10);
    try {
      await fetch(DB_URL + '/scores/' + QUIZ_TYPE + '.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(top10)
      });
    } catch {}
    renderLeaderboard('lb-end');
    document.getElementById('player-name').value = '';
  }

  async function renderLeaderboard(elId) {
    const el = document.getElementById(elId);
    el.innerHTML = '<li class="lb-loading">Načítám…</li>';
    const scores = await getScores();
    if (!scores.length) { el.innerHTML = '<li class="lb-empty">Zatím žádné výsledky.</li>'; return; }
    el.innerHTML = scores.map((s, i) => `
      <li>
        <span class="lb-rank">${i + 1}.</span>
        <span class="lb-name">${esc(s.name)}</span>
        <span class="lb-time">${formatTime(s.ms)}</span>
        <span class="lb-date">${esc(s.date)}</span>
      </li>`).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── INIT ─────────────────────────────────────────────────
  renderLeaderboard('lb-start');
</script>
</body>
</html>
